<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字幕</title>

  <style>
    body {
      background-color: white;
      color: black;
      text-align: center;
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      margin: 0;
      padding: 5vw;
    }

    #text {
      font-size: min(8vw, 60px);
      line-height: 1.6;
      font-weight: bold;
      word-break: break-word;
      white-space: pre-line;
      background: #f5f5f5;
      padding: 20px;
      border-radius: 15px;
    }

    #settingsBtn {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 16px;
    }

    #settings {
      position: fixed;
      bottom: 60px;
      right: 10px;
      background: white;
      border: 1px solid #ccc;
      padding: 10px;
      border-radius: 10px;
      display: none;
    }

    button {
      font-size: 16px;
      margin: 5px;
      padding: 8px 12px;
    }

    #langSelect {
      margin-top: 20vh;
    }
  </style>
</head>
<body>

<!-- 初回言語選択 -->
<div id="langSelect">
  <h2>言語を選択してください</h2>
  <button onclick="selectLang('jp')">日本語</button>
  <button onclick="selectLang('easy')">やさしい日本語</button>
  <button onclick="selectLang('en')">English</button>
  <button onclick="selectLang('zh')">中文</button>
</div>

<!-- 字幕 -->
<h1 id="text" style="display:none;"></h1>

<!-- 設定ボタン -->
<button id="settingsBtn" onclick="toggleSettings()" style="display:none;">
  ⚙ 設定
</button>

<!-- 設定パネル -->
<div id="settings">
  <div>
    <p>言語変更</p>
    <button onclick="selectLang('jp')">日本語</button>
    <button onclick="selectLang('easy')">やさしい</button>
    <button onclick="selectLang('en')">EN</button>
    <button onclick="selectLang('zh')">中文</button>
  </div>

  <div>
    <p>文字サイズ</p>
    <button onclick="changeSize(1)">＋</button>
    <button onclick="changeSize(-1)">－</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "dolphin-subtitle.firebaseapp.com",
  databaseURL: "https://dolphin-subtitle-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dolphin-subtitle",
  storageBucket: "dolphin-subtitle.firebasestorage.app",
  messagingSenderId: "600861531107",
  appId: "1:600861531107:web:6075d5f9a228fafde31ed6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentLang = null;
let latestData = null;
let size = 8;

// 言語選択
window.selectLang = function(lang) {
  currentLang = lang;

  document.getElementById("langSelect").style.display = "none";
  document.getElementById("text").style.display = "block";
  document.getElementById("settingsBtn").style.display = "block";

  updateText();
};

// サイズ変更
window.changeSize = function(n) {
  size += n;
  document.getElementById("text").style.fontSize = "min(" + size + "vw, 80px)";
};

// 設定開閉
window.toggleSettings = function() {
  const el = document.getElementById("settings");
  el.style.display = (el.style.display === "none") ? "block" : "none";
};

// 表示更新
function updateText() {
  if (latestData && currentLang) {
    document.getElementById("text").textContent = latestData[currentLang];
  }
}

// Firebase受信
const subtitleRef = ref(db, "subtitle");

onValue(subtitleRef, (snapshot) => {
  latestData = snapshot.val();
  updateText();
});
</script>

</body>
</html>
