<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>字幕</title>

  <style>
    body {
      background-color: white;
      color: black;
      text-align: center;
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
    }

    #text {
      font-size: 42px;
      margin-top: 40px;
    }

    button {
      font-size: 20px;
      margin: 10px;
      padding: 10px 15px;
    }

    #langSelect {
      margin-top: 100px;
    }

    #changeBtn {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<!-- 言語選択画面 -->
<div id="langSelect">
  <h2>言語を選択してください</h2>
  <button onclick="selectLang('jp')">日本語</button>
  <button onclick="selectLang('en')">English</button>
</div>

<!-- 字幕表示 -->
<h1 id="text" style="display:none;">ここに字幕</h1>

<!-- 言語変更ボタン -->
<button id="changeBtn" onclick="resetLang()" style="display:none;">
  言語変更
</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC604HE_gL1NfV40XKnnI9rnOTuaU0ElDo",
  authDomain: "dolphin-subtitle.firebaseapp.com",
  databaseURL: "https://dolphin-subtitle-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dolphin-subtitle",
  storageBucket: "dolphin-subtitle.firebasestorage.app",
  messagingSenderId: "600861531107",
  appId: "1:600861531107:web:6075d5f9a228fafde31ed6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentLang = null;
let latestData = null;

// 言語選択
window.selectLang = function(lang) {
  currentLang = lang;

  document.getElementById("langSelect").style.display = "none";
  document.getElementById("text").style.display = "block";
  document.getElementById("changeBtn").style.display = "block";

  if (latestData) {
    document.getElementById("text").textContent = latestData[currentLang];
  }
};

// 言語リセット（選び直し）
window.resetLang = function() {
  currentLang = null;

  document.getElementById("langSelect").style.display = "block";
  document.getElementById("text").style.display = "none";
  document.getElementById("changeBtn").style.display = "none";
};

// Firebase受信
const subtitleRef = ref(db, "subtitle");

onValue(subtitleRef, (snapshot) => {
  latestData = snapshot.val();
  if (latestData && currentLang) {
    document.getElementById("text").textContent = latestData[currentLang];
  }
});
</script>

</body>
</html>
